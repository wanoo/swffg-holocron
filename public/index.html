<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Archive Holocron — Star Wars FFG</title>
    <meta
      name="description"
      content="Archive hors-ligne des journaux, fiches et bestiaire d'une campagne Star Wars — Force et Destinée (FFG)."
    />
    <meta name="theme-color" content="#01070d" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <script>
      // Anti-flash : applique le thème ET l'emblème persistés AVANT le premier rendu.
      // La config ui de MONDE (thème verrouillé, emblème MJ) n'est connue que du
      // serveur : on lit son CACHE localStorage (posé par data.js) pour l'appliquer
      // sans flash dès la 2e visite ; la 1re visite est corrigée à l'arrivée de la
      // config (accepté). Le cas « MJ + thème verrouillé » est affiné par app.js.
      (function () {
        var t = null, e = null, ui = null;
        try {
          t = localStorage.getItem('holocron-theme');
          e = localStorage.getItem('holocron-emblem');
          var cfg = JSON.parse(localStorage.getItem('holocron-cache:/content/config') || 'null');
          ui = (cfg && cfg.body && cfg.body.ui) || null;
        } catch (err) { /* stockage indisponible */ }
        var ok = ['force-jedi', 'force-sith', 'age-of-rebellion', 'edge-of-the-empire'];
        if (ui && ok.indexOf(ui.theme) >= 0 && (ui.themeLocked || ok.indexOf(t) < 0)) t = ui.theme;
        document.documentElement.setAttribute('data-theme', ok.indexOf(t) >= 0 ? t : 'force-jedi');
        // Miroir de la liste de js/emblem.js (source du picker).
        var eok = ['rebel-alliance', 'galactic-empire', 'jedi-order', 'jedi', 'new-jedi-order',
          'sith', 'sith-empire', 'galactic-republic', 'old-republic', 'new-republic',
          'galactic-senate', 'separatists', 'first-order', 'phoenix-squadron', 'mandalorian',
          'nite-owls', 'black-sun', 'crimson-dawn', 'pyke-syndicate', 'hutt-clan', 'credits'];
        if (ui && eok.indexOf(ui.emblem) >= 0) e = ui.emblem; // l'emblème de monde prime
        document.documentElement.style.setProperty(
          '--user-emblem',
          "url('/img/emblems/" + (eok.indexOf(e) >= 0 ? e : 'rebel-alliance') + ".svg')"
        );
      })();
    </script>
    <link rel="stylesheet" href="css/themes.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/dice.css" />
    <link rel="stylesheet" href="css/journal.css" />
    <link rel="stylesheet" href="css/sheet.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/home.css" />
  </head>
  <body>
    <a class="skip-link" href="#content">Aller au contenu</a>

    <!-- Barre mobile : uniquement le burger (ouvre le tiroir) + la marque.
         Sur desktop la topbar n'existe plus : tout vit dans la sidebar. -->
    <header class="topbar">
      <button class="icon-btn hamburger" id="btn-menu" aria-label="Ouvrir le menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <a class="brand" href="#/" aria-label="Accueil">
        <span class="brand-mark" aria-hidden="true">◈</span>
        <span class="brand-text">Archive Holocron</span>
      </a>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar" aria-label="Navigation">
        <!-- Emblème du site (choisi par l'utilisateur, masque SVG teinté par le thème) -->
        <div class="sidebar-brand">
          <button
            class="sb-emblem-btn"
            id="btn-emblem"
            aria-label="Choisir l'emblème du site"
            aria-haspopup="menu"
            aria-expanded="false"
            title="Emblème"
          >
            <span class="sb-emblem" aria-hidden="true"></span>
          </button>
          <span class="sb-word">Archive<br />Holocron</span>
        </div>
        <div class="sidebar-search">
          <input
            id="sidebar-search-box"
            type="text"
            readonly
            placeholder="Rechercher…  (Ctrl K)"
            aria-label="Ouvrir la recherche"
          />
        </div>
        <!-- Actions rapides (ex-topbar) : dés, thème, compte, MJ -->
        <div class="sidebar-actions" id="sidebar-actions" role="group" aria-label="Actions rapides">
          <button
            class="icon-btn"
            id="btn-dice"
            aria-label="Dés : lancer et légende des symboles"
            aria-haspopup="dialog"
            title="Dés &amp; symboles"
          >
            <span class="ffg-die dt-proficiency" aria-hidden="true">c</span>
          </button>
          <button
            class="icon-btn"
            id="btn-theme"
            aria-label="Choisir le thème d'interface"
            aria-haspopup="menu"
            aria-expanded="false"
            title="Thème"
          >
            <span class="theme-dot" aria-hidden="true"></span>
          </button>
          <button class="icon-btn" id="btn-gm" aria-label="Espace Maître du Jeu" title="Espace MJ (clé requise)">
            <i class="ico" style="--ico: url('/img/icons/profile.svg')" aria-hidden="true"></i>
          </button>
        </div>
        <!-- Deux zones : sélecteur de parties (haut) + chapitrage (bas, scroll indépendant) -->
        <nav class="sidebar-parts" id="parts" aria-label="Sections de l'archive"></nav>
        <nav class="sidebar-chapters" id="chapters" aria-label="Chapitres"></nav>
        <!-- Retour au tableau de bord, façon mockups -->
        <a class="holocron-btn" id="holocron-home" href="#/">
          <span class="hb-ico" aria-hidden="true"></span>
          <span>Holocron central</span>
        </a>
      </aside>

      <main class="main" id="content" tabindex="-1"></main>
    </div>

    <div class="scrim" id="scrim" hidden></div>

    <!-- Palette de recherche (Ctrl/Cmd-K) -->
    <div class="palette-backdrop" id="palette" hidden>
      <div class="palette holo-frame" role="dialog" aria-modal="true" aria-label="Recherche">
        <input
          id="palette-input"
          type="text"
          placeholder="Rechercher journaux, pages, personnages…"
          autocomplete="off"
          spellcheck="false"
        />
        <ul class="palette-results" id="palette-results" role="listbox"></ul>
        <div class="palette-hint">
          <kbd>↑</kbd><kbd>↓</kbd> naviguer · <kbd>↵</kbd> ouvrir · <kbd>Esc</kbd> fermer
        </div>
      </div>
    </div>

    <!-- Modale dés : générateur + légende des symboles (fusionnés) -->
    <div class="modal-backdrop on-dark" id="generator" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-label="Dés et symboles">
        <div class="modal-head">
          <h2>Dés &amp; Symboles</h2>
          <button class="icon-btn" data-close aria-label="Fermer">✕</button>
        </div>
        <div class="modal-body" id="generator-body"></div>
      </div>
    </div>

    <!-- Modale carte compendium -->
    <div class="modal-backdrop on-dark" id="card-modal" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-label="Référence">
        <div class="modal-head">
          <h2 id="card-title">Référence</h2>
          <button class="icon-btn" data-close aria-label="Fermer">✕</button>
        </div>
        <div class="modal-body" id="card-body"></div>
      </div>
    </div>

    <script src="config.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
